name: stream_xtream
description: "StreamXtream - A high-quality streaming platform with Xtream support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  
  # Dependency Injection
  get_it: ^8.0.3
  
  # Networking
  dio: ^5.7.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  
  # Video Player - media_kit for HDR/Dolby Vision support
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.4
  media_kit_libs_linux: ^1.1.3
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_macos_video: ^1.0.10
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.4
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
